<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<base href="../" />
<title>DeviceHub — Add device (validation errors)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme/tokens.css" />
<link rel="stylesheet" href="theme/components.css" />
<link rel="stylesheet" href="theme/states.css" />
<link rel="stylesheet" href="theme/shell.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .back { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--muted-foreground); margin-bottom:16px; }
  .back:hover { color: var(--foreground); }
  .back svg { width:15px; height:15px; }

  /* single-page two-column: section nav + form */
  .form-cols { display:grid; grid-template-columns: 220px 1fr; gap:32px; align-items:start; }
  .secnav { position:sticky; top:90px; display:flex; flex-direction:column; gap:2px; }
  .secnav a { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-md); font-size:14px; color:var(--muted-foreground); cursor:pointer; }
  .secnav a .n { width:22px; height:22px; border-radius:9999px; border:1px solid var(--border); display:grid; place-items:center; font-size:12px; font-weight:600; flex:none; }
  .secnav a.active { background:var(--secondary); color:var(--secondary-foreground); font-weight:500; }
  .secnav a.active .n { background:var(--primary); color:var(--primary-foreground); border-color:var(--primary); }

  .form-stack { display:flex; flex-direction:column; gap:20px; }
  .sec-card { padding:24px; }
  .sec-head { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
  .sec-head .ic { width:34px; height:34px; border-radius:9px; background:var(--secondary); color:var(--secondary-foreground); display:grid; place-items:center; flex:none; }
  .sec-head .ic svg { width:17px; height:17px; }
  .sec-head h2 { font-size:16px; font-weight:600; }
  .sec-head p { font-size:12.5px; color:var(--muted-foreground); margin-top:1px; }

  .fgrid { display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
  .fgrid .full { grid-column: 1 / -1; }
  .req { color: var(--destructive); }
  .seg { display:inline-flex; gap:2px; padding:3px; background:var(--muted); border-radius:var(--radius-md); }
  .seg button { padding:7px 14px; border:none; background:transparent; border-radius:calc(var(--radius-md) - 2px); font-family:inherit; font-size:13px; font-weight:500; color:var(--muted-foreground); cursor:pointer; }
  .seg button.on { background:var(--card); color:var(--foreground); box-shadow:0 1px 2px rgba(16,24,40,.06); }
  .slider-row { display:flex; align-items:center; gap:14px; }
  .slider-row input[type=range]{ flex:1; accent-color: var(--primary); }
  .slider-row .pct { width:48px; text-align:right; font-variant-numeric:tabular-nums; font-weight:600; }

  /* action bar */
  .actionbar { margin-top:24px; padding-top:20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .actionbar .left { font-size:13px; color:var(--muted-foreground); }
  .actionbar .right { margin-left:auto; display:flex; gap:10px; }

  /* stepper */
  .stepper { display:flex; align-items:center; gap:0; margin-bottom:24px; }
  .step { display:flex; align-items:center; gap:10px; }
  .step .dot { width:30px; height:30px; border-radius:9999px; border:1px solid var(--border); display:grid; place-items:center; font-size:13px; font-weight:600; color:var(--muted-foreground); background:var(--card); flex:none; }
  .step.active .dot { background:var(--primary); color:var(--primary-foreground); border-color:var(--primary); }
  .step.done .dot { background:var(--secondary); color:var(--secondary-foreground); border-color:transparent; }
  .step .lbl { font-size:13px; font-weight:500; color:var(--muted-foreground); }
  .step.active .lbl, .step.done .lbl { color:var(--foreground); }
  .step .line { width:46px; height:2px; background:var(--border); margin:0 12px; }
  .step.done .line { background:var(--primary); }
  @media (max-width: 1000px){ .form-cols { grid-template-columns:1fr; } .secnav{ display:none; } .step .lbl{ display:none; } }
</style>
</head>
<body>
  <div id="page" data-title="Add device" data-crumb="Register a new asset in the inventory" data-active="devices">
    <a class="back" href="Device List.html"><i data-lucide="arrow-left"></i> Back to devices</a>
    <div id="body"></div>
  </div>

  <script src="theme/data.js"></script>
  <script src="theme/shell.js"></script>
  <script src="theme/states.js"></script>
  <script src="theme/uploads.js"></script>
  <script>
    const opts = (arr, ph) => `<option value="">${ph}</option>` + arr.map(v=>`<option>${v}</option>`).join("");
    function field(f){
      let ctrl = "";
      if (f.t==="select") ctrl = `<select class="select">${opts(f.opts, f.ph||"Select…")}</select>`;
      else if (f.t==="textarea") ctrl = `<textarea class="textarea" placeholder="${f.ph||""}"></textarea>`;
      else if (f.t==="seg") ctrl = `<div class="seg">${f.opts.map((o,i)=>`<button class="${i===0?'on':''}">${o}</button>`).join("")}</div>`;
      else if (f.t==="cond") ctrl = `<div class="slider-row"><input type="range" min="0" max="100" value="100" oninput="this.nextElementSibling.textContent=this.value+'%'"><span class="pct">100%</span></div>`;
      else ctrl = `<input class="input" type="${f.t||'text'}" placeholder="${f.ph||""}" ${f.mono?'style="font-family:var(--font-mono)"':''}>`;
      return `<div class="field ${f.full?'full':''}"><label class="label">${f.label}${f.req?' <span class="req">*</span>':''}</label>${ctrl}${f.hint?`<span class="field-hint">${f.hint}</span>`:''}</div>`;
    }

    const SECTIONS = [
      { id:"general", icon:"info", title:"General", desc:"Identity and ownership of the device.", fields:[
        { label:"Device name", req:true, ph:"e.g. Dell XPS 15 9530" },
        { label:"Device code", req:true, mono:true, ph:"DEV-0000-XXX", hint:"Unique. Auto-suggested from group." },
        { label:"Group", t:"select", req:true, opts:LOOKUPS.groups },
        { label:"Department", t:"select", req:true, opts:LOOKUPS.departments },
        { label:"Status", t:"select", req:true, opts:["In use","In storage","In repair","Retired"], hint:"Lifecycle state. Warranty/inventory alerts are tracked separately." },
      ]},
      { id:"classification", icon:"tags", title:"Classification", desc:"Make, model and technical detail.", fields:[
        { label:"Manufacturer", t:"select", opts:LOOKUPS.manufacturers },
        { label:"Model", ph:"e.g. XPS 15 9530" },
        { label:"Serial number", mono:true, ph:"e.g. 5KQ8R2" },
        { label:"Unit", t:"seg", opts:["Piece","Set","Box"] },
        { label:"Quantity", t:"number", ph:"1" },
        { label:"Specifications", t:"textarea", full:true, ph:"CPU, memory, storage, GPU…" },
      ]},
      { id:"lifecycle", icon:"activity", title:"Lifecycle", desc:"Source, condition and inventory cadence.", fields:[
        { label:"Source", t:"select", opts:LOOKUPS.sources },
        { label:"Import date", t:"date" },
        { label:"Condition", t:"cond", full:true, hint:"Estimated physical condition, 0–100%." },
        { label:"Storage position", ph:"e.g. HCMC · Floor 4 · Desk E-12", full:true },
        { label:"Last check date", t:"date" },
        { label:"Inventory cycle", t:"number", ph:"12", hint:"Months between inventory checks." },
      ]},
      { id:"warranty", icon:"shield-check", title:"Warranty", desc:"Coverage window from the supplier.", fields:[
        { label:"Warranty start", t:"date" },
        { label:"Warranty end", t:"date" },
      ]},
      { id:"media", icon:"paperclip", title:"Photos & documents", desc:"A device photo and any supporting files.",
        html:`<div class="fgrid">
          <div class="field"><label class="label">Device photos</label>${UPLOAD.photoZone()}</div>
          <div class="field"><label class="label">Documents</label>${UPLOAD.docsZone()}</div>
        </div>` },
      { id:"notes", icon:"sticky-note", title:"Notes", desc:"Anything else worth recording.", fields:[
        { label:"Note", t:"textarea", full:true, ph:"Free-text notes about this device…" },
      ]},
    ];

    const secCard = (s) => `<div class="card sec-card" id="sec-${s.id}">
        <div class="sec-head"><span class="ic"><i data-lucide="${s.icon}"></i></span><div><h2>${s.title}</h2><p>${s.desc}</p></div></div>
        ${s.html ? s.html : `<div class="fgrid">${s.fields.map(field).join("")}</div>`}
      </div>`;

    /* ---------- Single-page ---------- */
    function renderSingle(){
      document.getElementById("body").innerHTML = `
        <div class="form-cols">
          <nav class="secnav">${SECTIONS.map((s,i)=>`<a class="${i===0?'active':''}" data-sec="${s.id}"><span class="n">${i+1}</span>${s.title}</a>`).join("")}</nav>
          <div>
            <div class="form-stack">${SECTIONS.map(secCard).join("")}</div>
            <div class="actionbar">
              <span class="left"><span class="req">*</span> Required fields</span>
              <div class="right">
                <a class="btn btn-ghost" href="Device List.html">Cancel</a>
                <button class="btn btn-outline">Save as draft</button>
                <button class="btn btn-primary"><i data-lucide="check"></i> Create device</button>
              </div>
            </div>
          </div>
        </div>`;
      lucide.createIcons();
      initUploads(document.getElementById("body"));
      // scrollspy
      const links = [...document.querySelectorAll(".secnav a")];
      links.forEach(a => a.addEventListener("click", () => {
        document.getElementById("sec-"+a.dataset.sec).scrollIntoView({ behavior:"smooth", block:"start" });
      }));
    }

    /* ---------- Stepped ---------- */
    let step = 0;
    function stepperHTML(){
      const steps = [...SECTIONS.map(s=>s.title), "Review"];
      return `<div class="stepper">${steps.map((t,i)=>`
        <div class="step ${i===step?'active':''} ${i<step?'done':''}">
          <span class="dot">${i<step?'<i data-lucide=check style="width:14px;height:14px"></i>':i+1}</span><span class="lbl">${t}</span>
        </div>${i<steps.length-1?'<span class="line '+(i<step?'done':'')+'"></span>':''}`).join("")}</div>`;
    }
    function reviewCard(){
      return `<div class="card sec-card"><div class="sec-head"><span class="ic"><i data-lucide="clipboard-check"></i></span><div><h2>Review &amp; create</h2><p>Confirm the details before adding to inventory.</p></div></div>
        <div class="fgrid">
          <div><div class="label" style="color:var(--muted-foreground)">Name</div><div style="font-weight:500;margin-top:4px">Dell XPS 15 9530</div></div>
          <div><div class="label" style="color:var(--muted-foreground)">Code</div><div style="font-weight:500;margin-top:4px;font-family:var(--font-mono)">DEV-2041-XPS</div></div>
          <div><div class="label" style="color:var(--muted-foreground)">Group · Department</div><div style="font-weight:500;margin-top:4px">Laptop · Engineering</div></div>
          <div><div class="label" style="color:var(--muted-foreground)">Condition</div><div style="font-weight:500;margin-top:4px">100%</div></div>
        </div></div>`;
    }
    function renderStepped(){
      const isReview = step === SECTIONS.length;
      document.getElementById("body").innerHTML = `
        ${stepperHTML()}
        <div style="max-width:760px">
          ${isReview ? reviewCard() : secCard(SECTIONS[step])}
          <div class="actionbar">
            <a class="btn btn-ghost" href="Device List.html">Cancel</a>
            <div class="right">
              ${step>0?'<button class="btn btn-outline" id="prev"><i data-lucide="arrow-left"></i> Back</button>':''}
              ${isReview
                ? '<button class="btn btn-primary"><i data-lucide="check"></i> Create device</button>'
                : '<button class="btn btn-primary" id="next">Continue <i data-lucide="arrow-right"></i></button>'}
            </div>
          </div>
        </div>`;
      lucide.createIcons();
      initUploads(document.getElementById("body"));
      const n=document.getElementById("next"), p=document.getElementById("prev");
      n && n.addEventListener("click", ()=>{ step=Math.min(step+1,SECTIONS.length); renderStepped(); });
      p && p.addEventListener("click", ()=>{ step=Math.max(step-1,0); renderStepped(); });
    }

    document.addEventListener("shell:ready", () => {
      renderSingle();
      // --- Validation state: show the form after a failed submit ---
      const stack = document.querySelector(".form-stack");
      stack.insertAdjacentHTML("beforebegin", `<div class="form-banner"><i data-lucide="circle-alert"></i><div><div class="fb-t">3 fields need your attention</div><div class="fb-d">Fix the highlighted fields below, then create the device.</div></div></div>`);
      const gen = document.getElementById("sec-general");
      const fields = gen.querySelectorAll(".field");
      const setErr = (idx, msg, valueSetter) => {
        const f = fields[idx]; if (!f) return;
        f.classList.add("invalid");
        const ctrl = f.querySelector(".input,.select,.textarea");
        if (ctrl && valueSetter) valueSetter(ctrl);
        const hint = f.querySelector(".field-hint");
        if (hint) hint.remove();
        f.insertAdjacentHTML("beforeend", `<span class="field-error"><i data-lucide="circle-alert"></i>${msg}</span>`);
      };
      setErr(0, "Device name is required.");                                  // name empty
      setErr(1, "Code must match DEV-0000-XXX.", c => c.value = "xps15");      // bad format
      setErr(2, "Choose a group.");                                          // group not selected
      lucide.createIcons();
    });
  </script>
</body>
</html>

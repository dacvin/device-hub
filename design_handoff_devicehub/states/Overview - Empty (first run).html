<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<base href="../" />
<title>DeviceHub — Overview (first run)</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme/tokens.css" />
<link rel="stylesheet" href="theme/components.css" />
<link rel="stylesheet" href="theme/states.css" />
<link rel="stylesheet" href="theme/shell.css" />
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="page" data-title="Overview" data-crumb="Fleet health across all departments" data-active="overview">
    <div id="c"></div>
  </div>
  <script src="theme/data.js"></script>
  <script src="theme/shell.js"></script>
  <script src="theme/states.js"></script>
  <script>
    document.addEventListener("shell:ready", () => {
      document.getElementById("c").innerHTML = DH.emptyState({
        icon: "layout-dashboard",
        title: "Your fleet dashboard is empty",
        desc: "Once you register devices, this page summarizes lifecycle status, inventory by group, and anything that needs attention.",
        actions: [
          { label: "Set up catalogs", icon: "layers", variant: "btn-outline", href: "Groups.html" },
          { label: "Add your first device", icon: "plus", variant: "btn-primary", href: "Create Device.html" }
        ]
      });
      lucide.createIcons();
    });
  </script>

</html>

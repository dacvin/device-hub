<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<base href="../" />
<title>DeviceHub — Device list (error)</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme/tokens.css" />
<link rel="stylesheet" href="theme/components.css" />
<link rel="stylesheet" href="theme/states.css" />
<link rel="stylesheet" href="theme/shell.css" />
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="page" data-title="Devices" data-crumb="All registered devices" data-active="devices">
    <div id="c"></div>
  </div>
  <script src="theme/data.js"></script>
  <script src="theme/shell.js"></script>
  <script src="theme/states.js"></script>
  <script>
    document.addEventListener("shell:ready", () => {
      document.getElementById("c").innerHTML = DH.errorState({
        title: "Couldn't load devices",
        desc: "We couldn't reach the inventory service. Check your connection, then try again.",
        code: "Error: NETWORK_TIMEOUT · request id 7af3c1"
      });
      lucide.createIcons();
      document.getElementById("retry").addEventListener("click", () => DH.toast("Retrying…", { type: "info" }));
    });
  </script>
</body>
</html>

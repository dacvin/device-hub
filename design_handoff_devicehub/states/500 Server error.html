<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<base href="../" />
<title>DeviceHub — Something went wrong</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme/tokens.css" />
<link rel="stylesheet" href="theme/components.css" />
<link rel="stylesheet" href="theme/states.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body { height:100%; }
  body { margin:0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); display:grid; place-items:center; }
  .wrap { text-align:center; padding:40px; max-width:460px; }
  .mark { display:inline-flex; align-items:center; gap:9px; margin-bottom:36px; }
  .mark .glyph { width:30px; height:30px; border-radius:9px; background:var(--primary); color:var(--primary-foreground); display:grid; place-items:center; }
  .mark .glyph svg { width:17px; height:17px; }
  .mark .wm { font-size:17px; font-weight:600; letter-spacing:-0.01em; }
  .mark .wm b { color: var(--primary); font-weight:600; }
  .big { font-size:72px; font-weight:600; letter-spacing:-0.03em; line-height:1; font-variant-numeric:tabular-nums; }
  h1 { font-size:20px; font-weight:600; margin:18px 0 6px; }
  p { font-size:14px; color:var(--muted-foreground); line-height:1.55; margin:0 0 24px; }
  .acts { display:flex; gap:10px; justify-content:center; }
</style>
</head>
<body>
  <div class="wrap">
    <span class="mark"><span class="glyph"><i data-lucide="hard-drive"></i></span><span class="wm">Device<b>Hub</b></span></span>
    <div class="big" style="color:var(--destructive)">500</div>
    <h1>Something went wrong on our end</h1>
    <p>An unexpected error occurred while loading DeviceHub. Our team has been notified. Try again in a moment.</p>
    <div style="font-family:var(--font-mono);font-size:11.5px;color:var(--muted-foreground);background:var(--muted);display:inline-block;padding:5px 10px;border-radius:6px;margin-bottom:24px">request id: 9c2f-7afb-error</div>
    <div class="acts">
      <button class="btn btn-outline" onclick="location.reload()"><i data-lucide="refresh-cw"></i> Try again</button>
      <a class="btn btn-primary" href="Overview.html"><i data-lucide="arrow-left"></i> Back to overview</a>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>

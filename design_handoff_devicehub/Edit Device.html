<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeviceHub — Edit device</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme/tokens.css" />
<link rel="stylesheet" href="theme/components.css" />
<link rel="stylesheet" href="theme/shell.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .back { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--muted-foreground); margin-bottom:16px; }
  .back:hover { color: var(--foreground); }
  .back svg { width:15px; height:15px; }

  .edit-head { display:flex; align-items:center; gap:14px; margin-bottom:22px; }
  .edit-head .gicon { width:46px; height:46px; border-radius:12px; background:var(--secondary); color:var(--secondary-foreground); display:grid; place-items:center; flex:none; }
  .edit-head .gicon svg { width:22px; height:22px; }
  .edit-head h1 { font-size:22px; font-weight:600; letter-spacing:-0.02em; }
  .edit-head .code { font-family:var(--font-mono); font-size:12.5px; color:var(--muted-foreground); margin-top:2px; }

  .form-cols { display:grid; grid-template-columns: 220px 1fr; gap:32px; align-items:start; }
  .secnav { position:sticky; top:90px; display:flex; flex-direction:column; gap:2px; }
  .secnav a { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-md); font-size:14px; color:var(--muted-foreground); cursor:pointer; }
  .secnav a .n { width:22px; height:22px; border-radius:9999px; border:1px solid var(--border); display:grid; place-items:center; font-size:12px; font-weight:600; flex:none; }
  .secnav a.active { background:var(--secondary); color:var(--secondary-foreground); font-weight:500; }
  .secnav a.active .n { background:var(--primary); color:var(--primary-foreground); border-color:var(--primary); }

  .form-stack { display:flex; flex-direction:column; gap:20px; }
  .sec-card { padding:24px; }
  .sec-head { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
  .sec-head .ic { width:34px; height:34px; border-radius:9px; background:var(--secondary); color:var(--secondary-foreground); display:grid; place-items:center; flex:none; }
  .sec-head .ic svg { width:17px; height:17px; }
  .sec-head h2 { font-size:16px; font-weight:600; }
  .sec-head p { font-size:12.5px; color:var(--muted-foreground); margin-top:1px; }

  .fgrid { display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
  .fgrid .full { grid-column: 1 / -1; }
  .req { color: var(--destructive); }
  .seg { display:inline-flex; gap:2px; padding:3px; background:var(--muted); border-radius:var(--radius-md); }
  .seg button { padding:7px 14px; border:none; background:transparent; border-radius:calc(var(--radius-md) - 2px); font-family:inherit; font-size:13px; font-weight:500; color:var(--muted-foreground); cursor:pointer; }
  .seg button.on { background:var(--card); color:var(--foreground); box-shadow:0 1px 2px rgba(16,24,40,.06); }
  .slider-row { display:flex; align-items:center; gap:14px; }
  .slider-row input[type=range]{ flex:1; accent-color: var(--primary); }
  .slider-row .pct { width:48px; text-align:right; font-variant-numeric:tabular-nums; font-weight:600; }

  .actionbar { margin-top:24px; padding-top:20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  @media (max-width: 1000px){ .form-cols { grid-template-columns:1fr; } .secnav{ display:none; } }
</style>
</head>
<body>
  <div id="page" data-title="Edit device" data-crumb="" data-active="devices">
    <a class="back" href="Device Details.html"><i data-lucide="arrow-left"></i> Back to device</a>
    <div class="edit-head">
      <span class="gicon"><i data-lucide="laptop"></i></span>
      <div>
        <h1 id="eh-name">Edit device</h1>
        <div class="code" id="eh-code"></div>
      </div>
    </div>
    <div id="body"></div>
  </div>

  <script src="theme/data.js"></script>
  <script src="theme/shell.js"></script>
  <script src="theme/uploads.js"></script>
  <script>
    const d = window.DEVICES[0];

    function field(f){
      const v = f.value == null ? "" : String(f.value);
      let ctrl = "";
      if (f.t==="select") {
        ctrl = `<select class="select"><option value="">${f.ph||"Select…"}</option>${
          f.opts.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join("")}</select>`;
      } else if (f.t==="textarea") {
        ctrl = `<textarea class="textarea" placeholder="${f.ph||""}">${v}</textarea>`;
      } else if (f.t==="seg") {
        ctrl = `<div class="seg">${f.opts.map(o=>`<button class="${o.toLowerCase()===v.toLowerCase()?'on':''}">${o}</button>`).join("")}</div>`;
      } else if (f.t==="cond") {
        ctrl = `<div class="slider-row"><input type="range" min="0" max="100" value="${v||100}" oninput="this.nextElementSibling.textContent=this.value+'%'"><span class="pct">${v||100}%</span></div>`;
      } else {
        ctrl = `<input class="input" type="${f.t||'text'}" value="${v}" placeholder="${f.ph||""}" ${f.mono?'style="font-family:var(--font-mono)"':''}>`;
      }
      return `<div class="field ${f.full?'full':''}"><label class="label">${f.label}${f.req?' <span class="req">*</span>':''}</label>${ctrl}${f.hint?`<span class="field-hint">${f.hint}</span>`:''}</div>`;
    }

    const SECTIONS = [
      { id:"general", icon:"info", title:"General", desc:"Identity and ownership of the device.", fields:[
        { label:"Device name", req:true, value:d.name },
        { label:"Device code", req:true, mono:true, value:d.code },
        { label:"Group", t:"select", req:true, opts:LOOKUPS.groups, value:d.group },
        { label:"Department", t:"select", req:true, opts:LOOKUPS.departments, value:d.dept },
        { label:"Status", t:"select", req:true, opts:["In use","In storage","In repair","Retired"], value:({"in-use":"In use","storage":"In storage","repair":"In repair","retired":"Retired"})[d.status], hint:"Lifecycle state. Warranty/inventory alerts are tracked separately." },
      ]},
      { id:"classification", icon:"tags", title:"Classification", desc:"Make, model and technical detail.", fields:[
        { label:"Manufacturer", t:"select", opts:LOOKUPS.manufacturers, value:d.mfr },
        { label:"Model", value:d.model },
        { label:"Serial number", mono:true, value:d.sn },
        { label:"Unit", t:"seg", opts:["Piece","Set","Box"], value:d.unit },
        { label:"Quantity", t:"number", value:d.qty },
        { label:"Specifications", t:"textarea", full:true, value:d.spec },
      ]},
      { id:"lifecycle", icon:"activity", title:"Lifecycle", desc:"Source, condition and inventory cadence.", fields:[
        { label:"Source", t:"select", opts:LOOKUPS.sources, value:d.source },
        { label:"Import date", t:"date", value:d.imported },
        { label:"Condition", t:"cond", full:true, value:d.cond, hint:"Estimated physical condition, 0–100%." },
        { label:"Storage position", full:true, value:d.loc },
        { label:"Last check date", t:"date", value:d.lastCheck },
        { label:"Inventory cycle", t:"number", value:d.cycle, hint:"Months between inventory checks." },
      ]},
      { id:"warranty", icon:"shield-check", title:"Warranty", desc:"Coverage window from the supplier.", fields:[
        { label:"Warranty start", t:"date", value:d.wStart },
        { label:"Warranty end", t:"date", value:d.wEnd },
      ]},
      { id:"media", icon:"paperclip", title:"Photos & documents", desc:"A device photo and any supporting files.",
        html:`<div class="fgrid">
          <div class="field"><label class="label">Device photos</label>${UPLOAD.photoZone({ previews:[
            { name:"xps15-front.jpg", icon:"laptop" },
            { name:"xps15-ports.jpg", icon:"laptop" },
          ] })}</div>
          <div class="field"><label class="label">Documents</label>${UPLOAD.docsZone([
            { name:"dell-invoice-2023.pdf", size:284*1024 },
            { name:"warranty-card.pdf", size:96*1024 },
            { name:"spec-sheet.xlsx", size:42*1024 },
          ])}</div>
        </div>` },
      { id:"notes", icon:"sticky-note", title:"Notes", desc:"Anything else worth recording.", fields:[
        { label:"Note", t:"textarea", full:true, value:"Primary engineering workstation. Docked to two U2723QE monitors at desk E-12. Battery service recommended at next inventory." },
      ]},
    ];

    const secCard = (s) => `<div class="card sec-card" id="sec-${s.id}">
        <div class="sec-head"><span class="ic"><i data-lucide="${s.icon}"></i></span><div><h2>${s.title}</h2><p>${s.desc}</p></div></div>
        ${s.html ? s.html : `<div class="fgrid">${s.fields.map(field).join("")}</div>`}
      </div>`;

    function render(){
      document.getElementById("body").innerHTML = `
        <div class="form-cols">
          <nav class="secnav">${SECTIONS.map((s,i)=>`<a class="${i===0?'active':''}" data-sec="${s.id}"><span class="n">${i+1}</span>${s.title}</a>`).join("")}</nav>
          <div>
            <div class="form-stack">${SECTIONS.map(secCard).join("")}</div>
            <div class="actionbar">
              <button class="btn btn-destructive"><i data-lucide="trash-2"></i> Delete device</button>
              <div style="margin-left:auto;display:flex;gap:10px">
                <a class="btn btn-ghost" href="Device Details.html">Cancel</a>
                <button class="btn btn-primary"><i data-lucide="check"></i> Save changes</button>
              </div>
            </div>
          </div>
        </div>`;
      lucide.createIcons();
      initUploads(document.getElementById("body"));
      [...document.querySelectorAll(".secnav a")].forEach(a => a.addEventListener("click", () => {
        document.getElementById("sec-"+a.dataset.sec).scrollIntoView({ behavior:"smooth", block:"start" });
      }));
      // segmented toggles
      document.querySelectorAll(".seg").forEach(seg => seg.addEventListener("click", e => {
        if (e.target.tagName==="BUTTON"){ seg.querySelectorAll("button").forEach(b=>b.classList.remove("on")); e.target.classList.add("on"); }
      }));
    }

    document.addEventListener("shell:ready", () => {
      document.getElementById("eh-name").textContent = "Edit " + d.name;
      document.getElementById("eh-code").textContent = d.code;
      render();
    });
  </script>
</body>
</html>

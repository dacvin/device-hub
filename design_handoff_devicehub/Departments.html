<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeviceHub — Departments</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme/tokens.css" />
<link rel="stylesheet" href="theme/components.css" />
<link rel="stylesheet" href="theme/shell.css" />
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="page" data-title="Departments" data-crumb="Org units that devices are allocated to" data-active="departments">
    <template id="topbar-actions">
      <div class="searchbox"><i data-lucide="search"></i><input id="cat-search" placeholder="Search departments…" /></div>
      <button class="btn btn-outline"><i data-lucide="download"></i> Export</button>
      <button class="btn btn-primary"><i data-lucide="plus"></i> Add department</button>
    </template>
    <div id="catalog"></div>
  </div>

  <script src="theme/data.js"></script>
  <script src="theme/shell.js"></script>
  <script src="theme/catalog.js"></script>
  <script>
    document.addEventListener("shell:ready", () => {
      renderCatalog({
        field: "dept", singular: "Department",
        placeholderName: "Engineering",
        form: [
          { key: "head", label: "Manager", type: "text", ph: "e.g. Anh Tran" },
          { key: "loc", label: "Primary location", type: "text", ph: "e.g. HCMC · Floor 4" },
        ],
        cols: [
          { label: "Manager", get: it => it.head },
          { label: "Primary location", get: it => it.loc },
        ],
        items: [
          { name: "Engineering", head: "Anh Tran",   loc: "HCMC · Floor 4" },
          { name: "Design",      head: "Mai Pham",    loc: "HCMC · Floor 3" },
          { name: "Product",     head: "Khoa Le",     loc: "HCMC · Floor 3" },
          { name: "Sales",       head: "Hoa Nguyen",  loc: "Hanoi · Floor 2" },
          { name: "Finance",     head: "Tuan Vo",     loc: "HCMC · Floor 5" },
          { name: "HR",          head: "Linh Dang",   loc: "HCMC · Floor 2" },
          { name: "IT",          head: "Quan Bui",    loc: "HCMC · Server room" },
          { name: "Operations",  head: "Phuong Ho",   loc: "HCMC · Floor 1" },
        ],
      });
    });
  </script>
</body>
</html>

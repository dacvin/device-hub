<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeviceHub — Device details</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme/tokens.css" />
<link rel="stylesheet" href="theme/components.css" />
<link rel="stylesheet" href="theme/shell.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .back { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--muted-foreground); margin-bottom:16px; }
  .back:hover { color: var(--foreground); }
  .back svg { width:15px; height:15px; }

  .dhead { display:flex; align-items:flex-start; gap:18px; margin-bottom:22px; }
  .dhead .gicon { width:54px; height:54px; border-radius:14px; background:var(--secondary); color:var(--secondary-foreground); display:grid; place-items:center; flex:none; }
  .dhead .gicon svg { width:26px; height:26px; }
  .dhead h1 { font-size:24px; font-weight:600; letter-spacing:-0.02em; }
  .dhead .sub { display:flex; align-items:center; gap:10px; margin-top:6px; flex-wrap:wrap; }
  .dhead .code { font-family:var(--font-mono); font-size:13px; color:var(--muted-foreground); }
  .dhead .acts { margin-left:auto; display:flex; gap:8px; }

  .cols { display:grid; grid-template-columns: 1fr 320px; gap:20px; align-items:start; }
  .stack { display:flex; flex-direction:column; gap:20px; }

  .section-title { font-size:13px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--muted-foreground); display:flex; align-items:center; gap:8px; }
  .section-title svg { width:15px; height:15px; color:var(--primary); }
  .dl { display:grid; grid-template-columns: 1fr 1fr; gap:18px 28px; margin-top:18px; }
  .dl.one { grid-template-columns: 1fr; }
  .dl .k { font-size:12px; color:var(--muted-foreground); }
  .dl .v { font-size:14px; font-weight:500; margin-top:3px; }
  .dl .v.mono { font-family:var(--font-mono); font-weight:400; }
  .full { grid-column: 1 / -1; }

  /* right rail */
  .ring-wrap { display:flex; align-items:center; gap:16px; }
  .ring { width:84px; height:84px; flex:none; }
  .ring .num { font-size:20px; font-weight:600; }
  .rail-stat { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--border); }
  .rail-stat:last-child { border-bottom:none; }
  .rail-stat .ic { width:34px; height:34px; border-radius:9px; background:var(--muted); display:grid; place-items:center; flex:none; color:var(--muted-foreground); }
  .rail-stat .ic svg { width:17px; height:17px; }
  .rail-stat .k { font-size:12px; color:var(--muted-foreground); }
  .rail-stat .v { font-size:14px; font-weight:500; margin-top:1px; }

  .timeline { margin-top:18px; display:flex; flex-direction:column; }
  .tl-item { display:flex; gap:12px; padding-bottom:18px; position:relative; }
  .tl-item:not(:last-child)::before { content:""; position:absolute; left:11px; top:24px; bottom:0; width:2px; background:var(--border); }
  .tl-dot { width:24px; height:24px; border-radius:9999px; background:var(--secondary); color:var(--secondary-foreground); display:grid; place-items:center; flex:none; z-index:1; }
  .tl-dot svg { width:13px; height:13px; }
  .tl-item .ti { font-size:14px; font-weight:500; }
  .tl-item .tm { font-size:12px; color:var(--muted-foreground); margin-top:1px; }

  .tabs-wrap { margin-bottom:20px; }
  @media (max-width: 1080px){ .cols { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <div id="page" data-title="Device details" data-crumb="" data-active="devices">
    <a class="back" href="Device List.html"><i data-lucide="arrow-left"></i> Back to devices</a>

    <div class="dhead">
      <span class="gicon"><i data-lucide="laptop"></i></span>
      <div>
        <h1 id="d-name"></h1>
        <div class="sub">
          <span class="code" id="d-code"></span>
          <span class="sep-v" style="height:14px"></span>
          <span class="badge badge-secondary" id="d-group"></span>
          <span id="d-status"></span>
          <span id="d-flags"></span>
        </div>
      </div>
      <div class="acts">
        <button class="btn btn-outline"><i data-lucide="printer"></i> Print label</button>
        <button class="btn btn-outline btn-icon"><i data-lucide="ellipsis"></i></button>
        <button class="btn btn-primary" onclick="location.href='Edit Device.html'"><i data-lucide="pencil"></i> Edit device</button>
      </div>
    </div>

    <!-- Tabs (only shown in tabbed variation) -->
    <div class="tabs-wrap" id="tabsWrap" style="display:none">
      <div class="tabs">
        <button class="tab active" data-tab="details">Details</button>
        <button class="tab" data-tab="lifecycle">Warranty &amp; lifecycle</button>
        <button class="tab" data-tab="history">History</button>
      </div>
    </div>

    <div id="body"></div>
  </div>

  <script src="theme/data.js"></script>
  <script src="theme/shell.js"></script>
  <script>
    const d = window.DEVICES[0];
    function fmt(iso){ if(!iso) return "—"; const dt=new Date(iso); return dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }
    function daysBetween(iso){ return Math.round((new Date(iso) - new Date("2026-05-29"))/86400000); }

    function ring(v){
      const r=36, c=2*Math.PI*r, off=c*(1-v/100);
      const col = v>=70?"var(--green-500)":v>=40?"oklch(0.78 0.13 75)":"var(--destructive)";
      return `<svg class="ring" viewBox="0 0 84 84"><circle cx="42" cy="42" r="${r}" fill="none" stroke="var(--muted)" stroke-width="8"/>
        <circle cx="42" cy="42" r="${r}" fill="none" stroke="${col}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 42 42)"/>
        <text x="42" y="47" text-anchor="middle" class="num" fill="var(--foreground)" style="font-family:var(--font-sans)">${v}%</text></svg>`;
    }

    const dl = (rows, one) => `<div class="dl ${one?'one':''}">${rows.map(([k,v,mono,full])=>
      `<div class="${full?'full':''}"><div class="k">${k}</div><div class="v ${mono?'mono':''}">${v}</div></div>`).join("")}</div>`;

    const SEC = {
      identification: ["Identification","fingerprint", dl([
        ["Code", d.code, true],["Serial number", d.sn, true],
        ["Name", d.name],["Manufacturer", d.mfr],
        ["Model", d.model],["Group", d.group],
      ])],
      specs: ["Specifications","cpu", `<p style="margin-top:16px;font-size:14px;line-height:1.6">${d.spec}</p>`],
      allocation: ["Allocation","map-pin", dl([
        ["Department", d.dept],["Assigned location", d.loc],
        ["Unit", d.unit],["Quantity", String(d.qty)],
        ["Source", d.source],
      ])],
      lifecycle: ["Lifecycle","activity", dl([
        ["Import date", fmt(d.imported)],["Source", d.source],
        ["Condition", d.cond+"%"],["Inventory cycle", d.cycle+" months"],
        ["Last checked", fmt(d.lastCheck)],["Next check due", fmt("2026-03-02")],
      ])],
      warranty: ["Warranty","shield-check", dl([
        ["Warranty start", fmt(d.wStart)],["Warranty end", fmt(d.wEnd)],
        ["Coverage", daysBetween(d.wEnd)>0 ? daysBetween(d.wEnd)+" days remaining" : "Expired"],
      ])],
      notes: ["Notes","sticky-note", `<p style="margin-top:16px;font-size:14px;line-height:1.6;color:var(--muted-foreground)">Primary engineering workstation. Docked to two U2723QE monitors at desk E-12. Battery service recommended at next inventory.</p>`],
    };
    const card = (key) => { const [t,ic,content]=SEC[key]; return `<div class="card" style="padding:22px"><div class="section-title"><i data-lucide="${ic}"></i>${t}</div>${content}</div>`; };

    const rail = `
      <div class="card" style="padding:22px">
        <div class="section-title"><i data-lucide="gauge"></i>Condition</div>
        <div class="ring-wrap" style="margin-top:16px">${ring(d.cond)}
          <div><div style="font-size:14px;font-weight:500">Good condition</div><div style="font-size:12px;color:var(--muted-foreground);margin-top:2px">Last assessed ${fmt(d.lastCheck)}</div></div>
        </div>
      </div>
      <div class="card" style="padding:8px 22px">
        <div class="rail-stat"><span class="ic"><i data-lucide="shield-check"></i></span><div><div class="k">Warranty</div><div class="v">${daysBetween(d.wEnd)} days left · ends ${fmt(d.wEnd)}</div></div></div>
        <div class="rail-stat"><span class="ic"><i data-lucide="calendar-clock"></i></span><div><div class="k">Next inventory</div><div class="v">Due ${fmt("2026-03-02")}</div></div></div>
        <div class="rail-stat"><span class="ic"><i data-lucide="map-pin"></i></span><div><div class="k">Location</div><div class="v" style="font-weight:400">${d.loc}</div></div></div>
        <div class="rail-stat"><span class="ic"><i data-lucide="user"></i></span><div><div class="k">Department</div><div class="v">${d.dept}</div></div></div>
      </div>
      <div class="card" style="padding:22px">
        <div class="section-title"><i data-lucide="history"></i>Recent activity</div>
        <div class="timeline">
          <div class="tl-item"><span class="tl-dot"><i data-lucide="pencil"></i></span><div><div class="ti">Condition updated to 92%</div><div class="tm">Anh Tran · 02 Mar 2026</div></div></div>
          <div class="tl-item"><span class="tl-dot"><i data-lucide="map-pin"></i></span><div><div class="ti">Moved to Desk E-12</div><div class="tm">Anh Tran · 14 Jan 2025</div></div></div>
          <div class="tl-item"><span class="tl-dot"><i data-lucide="plus"></i></span><div><div class="ti">Device created</div><div class="tm">Le Minh · 14 Aug 2023</div></div></div>
        </div>
      </div>`;

    function renderTwoCol(){
      document.getElementById("tabsWrap").style.display = "none";
      document.getElementById("body").innerHTML = `
        <div class="cols">
          <div class="stack">${card("identification")}${card("specs")}${card("allocation")}${card("lifecycle")}${card("warranty")}${card("notes")}</div>
          <div class="stack">${rail}</div>
        </div>`;
      lucide.createIcons();
    }

    let curTab = "details";
    function renderTabbed(){
      document.getElementById("tabsWrap").style.display = "block";
      let inner = "";
      if (curTab==="details") inner = `<div class="stack">${card("identification")}${card("specs")}${card("allocation")}</div>`;
      if (curTab==="lifecycle") inner = `<div class="stack">${card("lifecycle")}${card("warranty")}<div class="card" style="padding:22px"><div class="section-title"><i data-lucide="gauge"></i>Condition</div><div class="ring-wrap" style="margin-top:16px">${ring(d.cond)}<div><div style="font-size:14px;font-weight:500">Good condition</div><div style="font-size:12px;color:var(--muted-foreground);margin-top:2px">Last assessed ${fmt(d.lastCheck)}</div></div></div></div></div>`;
      if (curTab==="history") inner = `<div class="card" style="padding:22px"><div class="section-title"><i data-lucide="history"></i>Full history</div><div class="timeline" style="margin-top:18px">
          <div class="tl-item"><span class="tl-dot"><i data-lucide="pencil"></i></span><div><div class="ti">Condition updated to 92%</div><div class="tm">Anh Tran · 02 Mar 2026</div></div></div>
          <div class="tl-item"><span class="tl-dot"><i data-lucide="shield-check"></i></span><div><div class="ti">Warranty verified with Dell</div><div class="tm">Anh Tran · 11 Apr 2025</div></div></div>
          <div class="tl-item"><span class="tl-dot"><i data-lucide="map-pin"></i></span><div><div class="ti">Moved to Desk E-12</div><div class="tm">Anh Tran · 14 Jan 2025</div></div></div>
          <div class="tl-item"><span class="tl-dot"><i data-lucide="plus"></i></span><div><div class="ti">Device created</div><div class="tm">Le Minh · 14 Aug 2023</div></div></div>
        </div></div>`;
      document.getElementById("body").innerHTML = inner;
      lucide.createIcons();
    }

    document.addEventListener("shell:ready", () => {
      document.getElementById("d-name").textContent = d.name;
      document.getElementById("d-code").textContent = d.code;
      document.getElementById("d-group").textContent = d.group;
      document.getElementById("d-status").innerHTML = DH.statusBadge(d.status);
      const fl = window.deviceFlags(d);
      document.getElementById("d-flags").innerHTML = fl.length ? DH.flagChips(d) : "";

      document.querySelectorAll("#tabsWrap .tab").forEach(t => t.addEventListener("click", () => {
        document.querySelectorAll("#tabsWrap .tab").forEach(x=>x.classList.remove("active"));
        t.classList.add("active"); curTab = t.dataset.tab; renderTabbed();
      }));

      renderTwoCol();
    });
  </script>
</body>
</html>

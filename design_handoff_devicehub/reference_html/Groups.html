<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeviceHub — Groups</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme/tokens.css" />
<link rel="stylesheet" href="theme/components.css" />
<link rel="stylesheet" href="theme/states.css" />
<link rel="stylesheet" href="theme/shell.css" />
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="page" data-title="Groups" data-crumb="Device categories and their inventory cadence" data-active="groups">
    <template id="topbar-actions">
      <div class="searchbox"><i data-lucide="search"></i><input id="cat-search" placeholder="Search groups…" /></div>
      <button class="btn btn-outline"><i data-lucide="download"></i> Export</button>
      <button class="btn btn-primary"><i data-lucide="plus"></i> Create group</button>
    </template>
    <div id="catalog"></div>
  </div>

  <script src="theme/data.js"></script>
  <script src="theme/shell.js"></script>
  <script src="theme/states.js"></script>
  <script src="theme/catalog.js"></script>
  <script>
    document.addEventListener("shell:ready", () => {
      renderCatalog({
        field: "group", singular: "Group",
        placeholderName: "Laptop",
        rowIcon: it => it.icon,
        form: [
          { key: "icon", label: "Icon", type: "select", icons: true, ph: "Choose an icon" },
          { key: "cycle", label: "Default inventory cycle", type: "number", suffix: "months", default: 12, ph: "12" },
        ],
        cols: [
          { label: "Default inventory cycle", get: it => it.cycle + " months" },
        ],
        items: [
          { name: "Laptop",     icon: "laptop",     cycle: 12 },
          { name: "Desktop",    icon: "monitor",    cycle: 12 },
          { name: "Monitor",    icon: "monitor",    cycle: 24 },
          { name: "Printer",    icon: "printer",    cycle: 12 },
          { name: "Network",    icon: "network",    cycle: 6 },
          { name: "Server",     icon: "server",     cycle: 6 },
          { name: "Mobile",     icon: "smartphone", cycle: 12 },
          { name: "Peripheral", icon: "webcam",     cycle: 24 },
        ],
      });
    });
  </script>
</body>
</html>

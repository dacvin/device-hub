<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeviceHub — Manufacturers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme/tokens.css" />
<link rel="stylesheet" href="theme/components.css" />
<link rel="stylesheet" href="theme/states.css" />
<link rel="stylesheet" href="theme/shell.css" />
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="page" data-title="Manufacturers" data-crumb="Vendors supplying the device fleet" data-active="manufacturers">
    <template id="topbar-actions">
      <div class="searchbox"><i data-lucide="search"></i><input id="cat-search" placeholder="Search manufacturers…" /></div>
      <button class="btn btn-outline"><i data-lucide="download"></i> Export</button>
      <button class="btn btn-primary"><i data-lucide="plus"></i> Create manufacturer</button>
    </template>
    <div id="catalog"></div>
  </div>

  <script src="theme/data.js"></script>
  <script src="theme/shell.js"></script>
  <script src="theme/states.js"></script>
  <script src="theme/catalog.js"></script>
  <script>
    document.addEventListener("shell:ready", () => {
      renderCatalog({
        field: "mfr", singular: "Manufacturer",
        placeholderName: "Dell",
        form: [
          { key: "support", label: "Support contact", type: "text", mono: true, ph: "e.g. support.dell.com" },
        ],
        cols: [
          { label: "Support contact", get: it => it.support, mono: true },
        ],
        items: [
          { name: "Dell",     support: "support.dell.com" },
          { name: "Apple",    support: "getsupport.apple.com" },
          { name: "Lenovo",   support: "support.lenovo.com" },
          { name: "HP",       support: "support.hp.com" },
          { name: "Cisco",    support: "cisco.com/support" },
          { name: "Synology", support: "synology.com/support" },
          { name: "Logitech", support: "support.logi.com" },
          { name: "Samsung",  support: "samsung.com/support" },
        ],
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeviceHub — Devices</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme/tokens.css" />
<link rel="stylesheet" href="theme/components.css" />
<link rel="stylesheet" href="theme/states.css" />
<link rel="stylesheet" href="theme/shell.css" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .toolbar .select { width: auto; min-width: 140px; height: 36px; }
  .toolbar .grow { flex: 1; }
  .chip-clear { display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 12px; border-radius: var(--radius-md); border: 1px dashed var(--border); color: var(--muted-foreground); background: transparent; font-size: 13px; cursor: pointer; font-family: inherit; }
  .chip-clear:hover { color: var(--foreground); border-color: var(--muted-foreground); }

  .table-wrap { overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  .table-scroll .table { min-width: 880px; }
  .codecell { font-family: var(--font-mono); font-size: 12.5px; color: var(--muted-foreground); }
  .namecell { font-weight: 500; }
  .thumbcol { width: 52px; padding-right: 0; }
  .cover-cell { width: 36px; height: 36px; border-radius: 8px; background: var(--secondary); color: var(--secondary-foreground); display: grid; place-items: center; flex: none; overflow: hidden; }
  .cover-cell svg { width: 18px; height: 18px; }
  .cover-cell img { width: 100%; height: 100%; object-fit: cover; }
  .subcell { font-size: 12px; color: var(--muted-foreground); }
  .cond { display: flex; align-items: center; gap: 8px; }
  .cond .track { width: 56px; height: 6px; border-radius: 9999px; background: var(--muted); overflow: hidden; display: block; }
  .cond .fill { display: block; height: 100%; border-radius: 9999px; }
  .cond .v { font-size: 13px; font-variant-numeric: tabular-nums; width: 34px; }
  .rowact { display: flex; align-items: center; }
  .loc { font-size: 13px; color: var(--muted-foreground); max-width: 200px; }
  th.checkcol, td.checkcol { width: 40px; padding-right: 0; }
  .qty { font-variant-numeric: tabular-nums; }

  /* card grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 16px; align-items: stretch; }
  .dcard { padding: 0; overflow: hidden; cursor: pointer; transition: border-color .12s, box-shadow .12s; display: flex; flex-direction: column; }
  .dcard:hover { border-color: var(--ring); box-shadow: 0 2px 10px rgba(16,24,40,.06); }
  .dcard-cover { position: relative; height: 132px; display: grid; place-items: center; background: linear-gradient(135deg, color-mix(in oklch, var(--green-100) 70%, var(--card)), color-mix(in oklch, var(--green-200) 55%, var(--card))); border-bottom: 1px solid var(--border); }
  .dark .dcard-cover { background: linear-gradient(135deg, color-mix(in oklch, var(--green-800) 30%, var(--card)), color-mix(in oklch, var(--secondary) 80%, var(--card))); }
  .dcard-cover .cover-lg { width: 56px; height: 56px; border-radius: 14px; background: var(--card); color: var(--primary); box-shadow: 0 2px 8px rgba(16,24,40,.08); }
  .dcard-cover .cover-lg svg { width: 26px; height: 26px; }
  .dcard-cover.has-photo { background: var(--muted); }
  .dcard-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .dcard-flags { margin-top: 14px; }
  .dcard-status { position: absolute; top: 12px; right: 12px; }
  .dcard-body { padding: 16px 18px 18px; display: flex; flex-direction: column; flex: 1; }
  .dcard h3 { font-size: 15px; font-weight: 600; }
  .dcard .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; margin-top: 14px; }
  .dcard .meta .k { font-size: 11px; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: .04em; }
  .dcard .meta .vv { font-size: 13px; font-weight: 500; margin-top: 1px; }
  .dcard .foot { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 18px; border-top: 1px solid var(--border); }
  .dcard-flags { margin-top: 14px; }
  /* guarantee a gap between the last content (flags or meta) and the footer's top border */
  .dcard-body > :nth-last-child(2) { margin-bottom: 18px; }

  /* columns dropdown */
  .col-menu { position: fixed; z-index: 70; min-width: 210px; background: var(--popover); color: var(--popover-foreground); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: 0 12px 32px rgba(16,24,40,.16); padding: 6px; }
  .col-menu-head { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted-foreground); padding: 8px 10px 6px; }
  .col-menu-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; border: none; background: transparent; border-radius: var(--radius-md); font-family: inherit; font-size: 13px; color: var(--foreground); cursor: pointer; text-align: left; }
  .col-menu-item:hover:not(.is-locked) { background: var(--accent); }
  .col-menu-item.is-locked { color: var(--muted-foreground); cursor: default; }
  .col-menu-item .col-lock { margin-left: auto; font-size: 11px; color: var(--muted-foreground); }
  .col-menu-item .checkbox svg { width: 11px; height: 11px; }

  .resultcount { font-size: 13px; color: var(--muted-foreground); margin-bottom: 12px; }
  .pager { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 0; margin-top: 4px; border-top: 1px solid var(--border); font-size: 13px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div id="page" data-title="Devices" data-crumb="Asset inventory across the fleet" data-active="devices">
    <template id="topbar-actions">
      <div class="searchbox"><i data-lucide="search"></i><input id="search" placeholder="Search code, name, serial…" /></div>
      <button class="btn btn-outline"><i data-lucide="download"></i> Export</button>
      <a class="btn btn-primary" href="Create Device.html"><i data-lucide="plus"></i> Create device</a>
    </template>

    <div class="toolbar">
      <select class="select" id="f-group"><option value="">All groups</option></select>
      <select class="select" id="f-status">
        <option value="">Any status</option>
        <option value="in-use">In use</option>
        <option value="storage">In storage</option>
        <option value="repair">In repair</option>
        <option value="retired">Retired</option>
      </select>
      <select class="select" id="f-flag">
        <option value="">Any flag</option>
        <option value="warranty">Warranty expiring</option>
        <option value="inventory">Inventory overdue</option>
      </select>
      <select class="select" id="f-mfr"><option value="">All manufacturers</option></select>
      <button class="chip-clear" id="clear" style="display:none"><i data-lucide="x" style="width:14px;height:14px"></i> Clear</button>
      <div class="grow"></div>
      <button class="btn btn-outline btn-sm" id="colBtn"><i data-lucide="sliders-horizontal"></i> Columns</button>
    </div>

    <div class="resultcount" id="count"></div>

    <div class="card empty-state" id="emptyState" style="display:none"></div>

    <div class="card table-wrap" id="tableView">
      <div class="table-scroll">
        <table class="table" id="tbl"><thead></thead><tbody></tbody></table>
      </div>
      <div class="pager" style="padding:14px 16px">
        <span id="pagecount"></span>
        <div class="row" style="gap:6px">
          <button class="btn btn-outline btn-sm" disabled><i data-lucide="chevron-left"></i></button>
          <button class="btn btn-outline btn-sm">1</button>
          <button class="btn btn-ghost btn-sm">2</button>
          <button class="btn btn-outline btn-sm"><i data-lucide="chevron-right"></i></button>
        </div>
      </div>
    </div>

    <div class="grid" id="gridView" style="display:none"></div>
  </div>

  <script src="theme/data.js"></script>
  <script src="theme/shell.js"></script>
  <script src="theme/states.js"></script>
  <script>
    const GROUP_ICON = { Laptop:"laptop", Desktop:"monitor", Monitor:"monitor", Printer:"printer", Network:"network", Server:"server", Mobile:"smartphone", Peripheral:"webcam" };
    let view = 0; // 0 comfortable, 1 compact, 2 cards
    const state = { group:"", status:"", mfr:"", flag:"", q:"" };

    function condColor(v){ return v >= 70 ? "var(--green-500)" : v >= 40 ? "oklch(0.78 0.13 75)" : "var(--destructive)"; }
    function condCell(v){ return `<div class="cond"><span class="v">${v}%</span><span class="track"><span class="fill" style="width:${v}%;background:${condColor(v)}"></span></span></div>`; }

    function filtered(){
      return window.DEVICES.filter(d =>
        (!state.group || d.group===state.group) &&
        (!state.status || d.status===state.status) &&
        (!state.mfr || d.mfr===state.mfr) &&
        (!state.flag || (window.deviceFlags(d).includes(state.flag))) &&
        (!state.q || (d.code+d.name+d.sn+d.model).toLowerCase().includes(state.q.toLowerCase())));
    }

    function cover(d, size){
      return `<span class="cover-cell ${size==='lg'?'cover-lg':''}"><i data-lucide="${GROUP_ICON[d.group]||'hard-drive'}"></i></span>`;
    }

    // column registry — drives both the table and the Columns toggle
    const COLUMNS = [
      { key:"photo", label:"Type icon", th:"",                    cls:"thumbcol", render:d=>cover(d) },
      { key:"code",  label:"Code",                                render:d=>`<span class="codecell">${d.code}</span>` },
      { key:"name",  label:"Name",  always:true,                  render:d=>`<a class="namecell" href="Device Details.html" style="color:inherit">${d.name}</a>` },
      { key:"group", label:"Group",                               render:d=>`<span class="badge badge-secondary">${d.group}</span>` },
      { key:"mfr",   label:"Manufacturer / Model",                render:d=>`<div class="namecell" style="font-weight:400">${d.mfr}</div>${view===1?'':`<div class="subcell">${d.model}</div>`}` },
      { key:"cond",  label:"Condition",                           render:d=>condCell(d.cond) },
      { key:"loc",   label:"Location",                            render:d=>`<span class="loc">${d.loc}</span>` },
      { key:"status",label:"Status",                              render:d=>DH.statusBadge(d.status) },
      { key:"flags", label:"Flags",                               render:d=>DH.flagChips(d) },
      { key:"qty",   label:"Qty",                                 render:d=>`<span class="qty">${d.qty}</span>` },
    ];
    const DEFAULT_COLS = COLUMNS.map(c=>c.key);
    // Persist HIDDEN columns (not visible), so columns added in future builds default to ON.
    // Default view hides the two widest, least-essential columns so the table fits a
    // normal screen without horizontal scroll — both stay re-enableable via the Columns menu.
    let hiddenCols = (()=>{ try{ const s=JSON.parse(localStorage.getItem("dh-cols-hidden")); return Array.isArray(s)?s:["mfr","loc"]; }catch(_){ return ["mfr","loc"]; } })();
    const isOn = (k)=>!hiddenCols.includes(k);

    function renderTable(list){
      const compact = view===1;
      document.getElementById("tbl").className = "table" + (compact ? " compact" : "");
      const cols = COLUMNS.filter(c=>isOn(c.key));
      document.querySelector("#tbl thead").innerHTML = "<tr>"
        + `<th class="checkcol"><span class="checkbox"></span></th>`
        + cols.map(c=>`<th class="${c.cls||''}">${c.th!==undefined?c.th:c.label}</th>`).join("")
        + `<th class="actcol"></th></tr>`;
      document.querySelector("#tbl tbody").innerHTML = list.map(d => `
        <tr data-code="${d.code}">
          <td class="checkcol"><span class="checkbox" data-code="${d.code}"></span></td>
          ${cols.map(c=>`<td class="${c.cls||''}">${c.render(d)}</td>`).join("")}
          <td class="actcol"><div class="rowact row" style="gap:4px"><a class="icon-btn" href="Edit Device.html" style="width:30px;height:30px;border:none" title="Edit"><i data-lucide="pencil"></i></a><button class="icon-btn js-del" data-code="${d.code}" style="width:30px;height:30px;border:none" title="Delete"><i data-lucide="trash-2"></i></button></div></td>
        </tr>`).join("");
      lucide.createIcons();
    }

    function renderCards(list){
      document.getElementById("gridView").innerHTML = list.map(d => `
        <div class="card dcard" onclick="location.href='Device Details.html'">
          <div class="dcard-cover ${d.photo?'has-photo':''}">
            ${d.photo ? `<img class="dcard-img" src="${d.photo}" alt="${d.name}" />` : cover(d,'lg')}
            <span class="dcard-status">${DH.statusBadge(d.status)}</span>
          </div>
          <div class="dcard-body">
            <h3>${d.name}</h3>
            <div class="codecell">${d.code}</div>
            <div class="meta">
              <div><div class="k">Manufacturer</div><div class="vv">${d.mfr}</div></div>
              <div><div class="k">Group</div><div class="vv">${d.group}</div></div>
              <div style="grid-column:1/-1"><div class="k">Model</div><div class="vv" style="font-weight:400">${d.model}</div></div>
              <div style="grid-column:1/-1"><div class="k">Location</div><div class="vv" style="font-weight:400">${d.loc}</div></div>
            </div>
            ${window.deviceFlags(d).length?`<div class="dcard-flags">${DH.flagChips(d)}</div>`:''}
            <div class="foot">
              ${condCell(d.cond)}
              <span class="subcell">Qty ${d.qty}</span>
            </div>
          </div>
        </div>`).join("");
      lucide.createIcons();
    }

    /* ---- Columns dropdown ---- */
    function toggleColMenu(btn){
      let menu = document.getElementById("colMenu");
      if (menu) { menu.remove(); return; }
      menu = document.createElement("div");
      menu.id = "colMenu";
      menu.className = "col-menu";
      menu.innerHTML = `<div class="col-menu-head">Toggle columns</div>`
        + COLUMNS.map(c=>`<button class="col-menu-item ${c.always?'is-locked':''}" data-key="${c.key}" ${c.always?'disabled':''}>
            <span class="checkbox ${isOn(c.key)?'checked':''}">${isOn(c.key)?'<i data-lucide=check></i>':''}</span>
            <span>${c.label}</span>${c.always?'<span class="col-lock">Required</span>':''}
          </button>`).join("");
      document.body.appendChild(menu);
      const r = btn.getBoundingClientRect();
      menu.style.top = (r.bottom + 6) + "px";
      menu.style.right = (window.innerWidth - r.right) + "px";
      lucide.createIcons();
      menu.querySelectorAll(".col-menu-item:not(.is-locked)").forEach(it => it.addEventListener("click", () => {
        const k = it.dataset.key;
        if (isOn(k)) hiddenCols.push(k); else hiddenCols = hiddenCols.filter(x=>x!==k);
        localStorage.setItem("dh-cols-hidden", JSON.stringify(hiddenCols));
        render();
        // refresh the menu's checkmarks
        it.querySelector(".checkbox").classList.toggle("checked", isOn(k));
        it.querySelector(".checkbox").innerHTML = isOn(k) ? '<i data-lucide=check></i>' : '';
        lucide.createIcons();
      }));
      setTimeout(() => document.addEventListener("mousedown", function off(e){
        if (!menu.contains(e.target) && e.target!==btn && !btn.contains(e.target)) { menu.remove(); document.removeEventListener("mousedown", off); }
      }), 0);
    }

    function render(){
      const list = filtered();
      document.getElementById("count").textContent = `${list.length} of ${window.DEVICES.length} devices`;
      document.getElementById("pagecount").textContent = `Showing 1–${list.length} of ${list.length}`;
      const any = state.group||state.dept||state.status||state.mfr||state.flag||state.q;
      const showCards = view===2;
      const empty = list.length === 0;

      // empty state replaces whichever view is active
      const es = document.getElementById("emptyState");
      es.style.display = empty ? "" : "none";
      document.getElementById("tableView").style.display = (empty || showCards) ? "none" : "";
      document.getElementById("gridView").style.display = (empty || !showCards) ? "none" : "grid";
      if (empty) {
        const noDevices = window.DEVICES.length === 0;
        es.innerHTML = `
          <div class="empty-ic"><i data-lucide="${any ? 'search-x' : 'hard-drive'}"></i></div>
          <div class="empty-title">${any ? 'No devices match these filters' : 'No devices yet'}</div>
          <div class="empty-desc">${any
            ? 'Try removing a filter or searching for something else.'
            : 'Register your first device to start tracking the fleet.'}</div>
          <div class="empty-actions">${any
            ? '<button class="btn btn-outline" id="es-clear"><i data-lucide="x"></i> Clear filters</button>'
            : ''}<a class="btn btn-primary" href="Create Device.html"><i data-lucide="plus"></i> Create device</a></div>`;
        lucide.createIcons();
        const esc = document.getElementById("es-clear");
        esc && esc.addEventListener("click", () => document.getElementById("clear").click());
      } else if (showCards) renderCards(list); else renderTable(list);

      if (!empty && !showCards) syncChecks();
      document.getElementById("clear").style.display = any ? "inline-flex" : "none";
    }

    /* ---- Bulk selection ---- */
    const selected = new Set();
    let bulk;
    function syncChecks(){
      document.querySelectorAll('#tbl tbody .checkbox[data-code]').forEach(box=>{
        const on = selected.has(box.dataset.code);
        box.classList.toggle('checked', on);
        box.innerHTML = on ? '<i data-lucide="check"></i>' : '';
        const tr = box.closest('tr'); if (tr) tr.classList.toggle('row-selected', on);
      });
      const head = document.querySelector('#tbl thead .checkbox');
      if (head){
        const vis = filtered();
        const sel = vis.filter(d=>selected.has(d.code)).length;
        const allOn = sel>0 && sel===vis.length;
        const part  = sel>0 && sel<vis.length;
        head.classList.toggle('checked', allOn);
        head.classList.toggle('indeterminate', part);
        head.innerHTML = allOn ? '<i data-lucide="check"></i>' : part ? '<i data-lucide="minus"></i>' : '';
      }
      lucide.createIcons();
    }
    function updateBulk(){ if (bulk) bulk.update(selected.size); }
    function clearSel(){ selected.clear(); syncChecks(); updateBulk(); }

    document.addEventListener("shell:ready", () => {
      // populate selects
      const fill = (id, arr, label) => { const el=document.getElementById(id); arr.forEach(v=>el.insertAdjacentHTML("beforeend",`<option>${v}</option>`)); };
      fill("f-group", LOOKUPS.groups); fill("f-mfr", LOOKUPS.manufacturers);
      const bind = (id,key)=>document.getElementById(id).addEventListener("change",e=>{state[key]=e.target.value;render();});
      bind("f-group","group"); bind("f-status","status"); bind("f-mfr","mfr"); bind("f-flag","flag");

      // apply filters passed via URL (from catalog pages)
      const params = new URLSearchParams(location.search);
      [["group","f-group"],["status","f-status"],["mfr","f-mfr"],["flag","f-flag"]].forEach(([key,id]) => {
        const v = params.get(key);
        if (v) {
          state[key] = v;
          const el = document.getElementById(id);
          if (el) {
            el.value = v;
            const opt = [...el.options].find(o => o.value === v);
            if (opt) opt.setAttribute("selected", "selected");
          }
        }
      });
      document.getElementById("search").addEventListener("input", e=>{state.q=e.target.value;render();});
      document.getElementById("clear").addEventListener("click", ()=>{
        Object.assign(state,{group:"",status:"",mfr:"",flag:"",q:""});
        ["f-group","f-status","f-mfr","f-flag"].forEach(id=>document.getElementById(id).value="");
        document.getElementById("search").value=""; render();
      });

      DH.variantSwitcher("", ["Table", "Cards"], (i)=>{ view = i===0 ? 0 : 2; render(); }, 0);
      document.getElementById("colBtn").addEventListener("click", e => toggleColMenu(e.currentTarget));

      // bulk selection bar (raised so it clears the View switcher)
      bulk = DH.bulkBar({ raised: true });
      bulk.setActions(
        `<button class="btn btn-outline btn-sm" id="bulk-export"><i data-lucide="download"></i> Export</button>`
        + `<button class="btn btn-outline btn-sm" id="bulk-delete" style="color:var(--destructive)"><i data-lucide="trash-2"></i> Delete</button>`);
      bulk.onClear(clearSel);
      document.getElementById("tbl").addEventListener("click", e => {
        const box = e.target.closest(".checkbox"); if (!box) return;
        if (box.closest("thead")) {
          const vis = filtered();
          const allOn = vis.length && vis.every(d=>selected.has(d.code));
          vis.forEach(d => allOn ? selected.delete(d.code) : selected.add(d.code));
        } else {
          const c = box.dataset.code;
          selected.has(c) ? selected.delete(c) : selected.add(c);
        }
        syncChecks(); updateBulk();
      });
      document.getElementById("bulk-export").addEventListener("click", () => { const n = selected.size; clearSel(); DH.toast(`Export started`, { type: "info", desc: `Preparing a CSV of ${n} device${n>1?'s':''}…` }); });
      // per-row delete (with confirmation)
      document.getElementById("tbl").addEventListener("click", e => {
        const del = e.target.closest(".js-del"); if (!del) return;
        const code = del.dataset.code;
        const dev = window.DEVICES.find(d => d.code === code);
        DH.confirm({
          title: `Delete ${dev ? dev.name : "device"}?`,
          desc: "Are you sure you want to delete this device?",
          confirmLabel: "Delete", icon: "trash-2",
          onConfirm: () => { window.DEVICES = window.DEVICES.filter(d => d.code !== code); selected.delete(code); render(); updateBulk(); DH.toast("Device deleted", { desc: "Moved to the recycle bin." }); }
        });
      });
      document.getElementById("bulk-delete").addEventListener("click", () => {
        const n = selected.size;
        DH.confirm({
          title: `Delete ${n} device${n>1?'s':''}?`,
          desc: `Are you sure you want to delete the selected device${n>1?'s':''}?`,
          confirmLabel: "Delete", icon: "trash-2",
          onConfirm: () => { window.DEVICES = window.DEVICES.filter(d => !selected.has(d.code)); clearSel(); render(); DH.toast(`${n} device${n>1?'s':''} deleted`, { desc: "Moved to the recycle bin." }); }
        });
      });

      render();
    });
  </script>
</body>
</html>
